<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <main class="page">
      <section class="chat-shell auth-shell">
        <header class="chat-header">
          <div>
            <h1>Create account</h1>
            <p class="subtitle">
              Register a user to start saving information later.
            </p>
          </div>
        </header>

        <section class="auth-card">
          {% if error %}
          <p class="auth-message auth-error">{{ error }}</p>
          {% endif %}

          <form class="auth-form" action="{{ url_for('register') }}" method="post">
            <label for="username">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              minlength="3"
              required
            />

            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />

            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              minlength="6"
              required
            />

            <button type="submit">Create account</button>
          </form>

          <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('login') }}">Go to login</a>
          </p>
        </section>
      </section>
    </main>
  </body>
</html>
